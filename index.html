<!DOCTYPE html>
<html lang="tr">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonsuz Koşu</title>
    <style>
        @font-face {
          font-family: 'W95FA';
          src: url('fonts/W95FA.otf');
        }

        body {
          margin: 0;
          background: #222;
          overflow: hidden;
          touch-action: none;
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
        }
        canvas {
          display: block;
          background: #87ceeb;
          max-width: 100%;
          max-height: 100vh;
        }
        #loading {
          position: absolute;
          color: white;
          font-family: 'W95FA';
          font-size: 20px;
          text-align: center;
        }
    </style>
</head>
<body>

<div id="loading">Yükleniyor...<br><span id="progress">0%</span></div>
<canvas id="game" width="800" height="400" style="display:none;"></canvas>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;

    const GROUND_Y = 340;
    const GROUND_HEIGHT = 60;
    const GRAVITY = 0.6;
    const JUMP_POWER = -12;
    const INITIAL_SPEED = 5;
    const MAX_SPEED = 12;
    const COIN_SCORE = 2;
    const OBSTACLE_SCORE = 1;

    function resize() {
      const ratio = 800 / 400;
      let w = window.innerWidth;
      let h = window.innerHeight;
      if (w / h > ratio) w = h * ratio;
      else h = w / ratio;
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
    }
    window.addEventListener("resize", resize);
    resize();

    let imagesLoaded = 0;
    let totalImages = 0;
    let gameStarted = false;
    const loadingDiv = document.getElementById("loading");
    const progressSpan = document.getElementById("progress");

    function imageLoaded() {
      imagesLoaded++;
      const percent = Math.floor((imagesLoaded / totalImages) * 100);
      progressSpan.textContent = percent + "%";
      if (imagesLoaded === totalImages) {
        loadingDiv.style.display = "none";
        canvas.style.display = "block";
        gameStarted = true;
        loop();
      }
    }

    function loadImage(src) {
      totalImages++;
      const img = new Image();
      img.onload = imageLoaded;
      img.onerror = () => {
        console.error("Görsel yüklenemedi:", src);
        imageLoaded();
      };
      img.src = src;
      return img;
    }

    let gameOver = false;
    let score = 0;
    let highScore = localStorage.getItem("highScore") || 0;

    const player = {
      x: 100, y: GROUND_Y - 100, w: 80, h: 100,
      vy: 0, onGround: true, frame: 0, frameTimer: 0, frameSpeed: 6
    };

    const runFrames = [];
    for (let i = 1; i <= 8; i++) {
      runFrames.push(loadImage(`player/run_${i}.png`));
    }

    const sunImg = loadImage("decorations/sun.png");
    const mountainImg = loadImage("decorations/mountain.png");
    const restartImg = loadImage("ui/restart.png");
    const obstacleImg = loadImage("obstacles/obstacle.png");
    const obstacle2Img = loadImage("obstacles/obstacle2.png");
    const coinImg = loadImage("collectibles/coin.png");
    const cloudImgs = [
      loadImage("decorations/cloud1.png"),
      loadImage("decorations/cloud2.png")
    ];

    const restartBtn = {
      x: canvas.width / 2 - 24,
      y: canvas.height / 2 + 20,
      w: 48, h: 48
    };

    let clouds = [];
    function initClouds() {
      clouds = [];
      for (let i = 0; i < 5; i++) {
        clouds.push({
          x: Math.random() * canvas.width,
          y: 40 + Math.random() * 80,
          w: 80 + Math.random() * 80,
          h: 50 + Math.random() * 40,
          speed: 0.2 + Math.random() * 0.3,
          img: cloudImgs[Math.floor(Math.random() * cloudImgs.length)]
        });
      }
    }
    initClouds();

    let mountains = [];
function initMountains() {
  mountains = [];
  for (let i = 0; i < 3; i++) {  // 3 dağ katmanı
    mountains.push({
      x: i * 400,  // Yan yana dağlar
      y: GROUND_Y - 300,  // Yükseklik
      w: 500,  // Genişlik
      h: 500,  // Yükseklik
      speed: 0.5 + (i * 0.2)  // Paralaks efekti için farklı hızlar
    });
  }
}
initMountains();

    let obstacles = [], coins = [], spawnTimer = 0, speed = INITIAL_SPEED;

    function jump() {
      if (!player.onGround || gameOver) return;
      player.vy = JUMP_POWER;
      player.onGround = false;
    }

    window.addEventListener("keydown", e => {
      if (e.code === "Space") jump();
      if (e.code === "Enter" && gameOver) resetGame();
    });

    function handleClick(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const mx = (clientX - rect.left) * scaleX;
      const my = (clientY - rect.top) * scaleY;
      if (gameOver) {
        if (mx >= restartBtn.x && mx <= restartBtn.x + restartBtn.w &&
            my >= restartBtn.y && my <= restartBtn.y + restartBtn.h) {
          resetGame();
        }
      } else {
        jump();
      }
    }

    canvas.addEventListener("click", e => handleClick(e.clientX, e.clientY));
    canvas.addEventListener("touchstart", e => {
      e.preventDefault();
      handleClick(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

   function isColliding(a, b, padding = 0) {
  return a.x + padding < b.x + b.w - padding &&
         a.x + a.w - padding > b.x + padding &&
         a.y + padding < b.y + b.h - padding &&
         a.y + a.h - padding > b.y + padding;
}
    let lastTime = performance.now(), fps = 0, frames = 0;
    function updateFPS() {
      const now = performance.now();
      frames++;
      if (now - lastTime >= 1000) { fps = frames; frames = 0; lastTime = now; }
    }

    function updateSpeed() {
      const target = INITIAL_SPEED + Math.min(score * 0.08, MAX_SPEED - INITIAL_SPEED);
      speed += (target - speed) * 0.05;
    }

function spawnObjects() {
  spawnTimer++;
const minInterval = 60;   // Minimum mesafe
const maxInterval = 120;  // Maksimum mesafe
const spawnInterval = Math.max(minInterval, maxInterval - score);  if (spawnTimer > spawnInterval) {
if (Math.random() < 0.7) {
  const useObstacle2 = Math.random() < 0.5;
  const obstacleImage = useObstacle2 ? obstacle2Img : obstacleImg;

  // 2. engel için daha büyük boyut
  const obstacleWidth = useObstacle2 ? 65 : 50;   // obstacle2 için 65, diğeri 50
  const obstacleHeight = useObstacle2 ? 80 : 60;  // obstacle2 için 80, diğeri 60
  const obstaclePadding = useObstacle2 ? 15 : 10;

  obstacles.push({
    x: canvas.width + 80,
    y: GROUND_Y - obstacleHeight,  // Yüksekliğe göre Y pozisyonu ayarla
    w: obstacleWidth,
    h: obstacleHeight,
    scored: false,
    img: obstacleImage
  });
}
    if (Math.random() < 0.8) {
      const moving = Math.random() < 0.4;

      // 3 farklı yükseklik seviyesi
      const heightType = Math.random();
      let coinY;

      if (heightType < 0.33) {
        // Zeminde (kolay)
        coinY = GROUND_Y - 60 - Math.random() * 20;  // Zemine yakın (40-60 piksel yukarıda)
      } else if (heightType < 0.66) {
        // Orta yükseklikte (mevcut)
        coinY = GROUND_Y - 140 - Math.random() * 40;  // Orta seviye (140-180 piksel yukarıda)
      } else {
        // Yüksekte (zor - zıplama gerekli)
        coinY = GROUND_Y - 200 - Math.random() * 40;  // Yüksek seviye (200-240 piksel yukarıda)
      }

      coins.push({
        x: canvas.width + 150 + Math.random() * 200,
        y: coinY,
        baseY: coinY,
        w: 42, h: 42, collected: false,
        angle: Math.random() * Math.PI * 2,
        spinSpeed: 0.08 + Math.random() * 0.08,
        isMoving: moving,
        movePhase: Math.random() * Math.PI * 2,
        moveSpeed: 0.03 + Math.random() * 0.04,
        moveRange: 15 + Math.random() * 25
      });
    }
    spawnTimer = 0;
  }
}
    function resetGame() {
      if (score > highScore) {
        highScore = score;
        localStorage.setItem("highScore", highScore);
      }
      gameOver = false; score = 0; obstacles = []; coins = [];
      player.y = GROUND_Y - player.h; player.vy = 0; player.onGround = true;
      player.frame = 0; speed = INITIAL_SPEED; spawnTimer = 0;
    }

    function update() {
  if (gameOver || !gameStarted) return;
  updateSpeed();
  if (player.onGround) {
    player.frameTimer++;
    if (player.frameTimer > player.frameSpeed) {
      player.frame = (player.frame + 1) % runFrames.length;
      player.frameTimer = 0;
    }
  }
  player.vy += GRAVITY;
  player.y += player.vy;
  if (player.y + player.h >= GROUND_Y) {
    player.y = GROUND_Y - player.h; player.vy = 0; player.onGround = true;
  }
  spawnObjects();

 obstacles.forEach(o => {
  o.x -= speed;

  const hitboxPadding = o.padding || 10;

  if (isColliding(player, o, hitboxPadding)) {
    const playerBottom = player.y + player.h;
    const playerCenterX = player.x + player.w / 2;
    const obstacleCenterX = o.x + o.w / 2;
    const obstacleTop = o.y;
    const playerRight = player.x + player.w;
    const obstacleLeft = o.x;

    // Sağdan temas kontrolü
    const comingFromRight = playerRight > obstacleLeft + o.w * 0.8;  // Engeli geçmiş

    // Üstten gelme kontrolü
    const comingFromAbove = player.vy > 0 && (player.y < obstacleTop - 10);
    const nearCenter = Math.abs(playerCenterX - obstacleCenterX) < o.w * 0.9;

    const isLandingOnTop = comingFromAbove &&
                           nearCenter &&
                           playerBottom >= obstacleTop &&
                           playerBottom <= obstacleTop + 30;

    if (isLandingOnTop) {
      player.y = o.y - player.h;
      player.vy = -8;
      player.onGround = false;
    } else if (!comingFromRight) {  // ← YENİ: Sağdan gelmiyorsa game over
      gameOver = true;
    }
    // Sağdan geliyorsa hiçbir şey yapma (engeli geçmiş)
  }

  if (!o.scored && o.x + o.w < player.x) {
    score += OBSTACLE_SCORE;
    o.scored = true;
  }
});

  obstacles = obstacles.filter(o => o.x + o.w > 0);

  coins.forEach(c => {
    c.x -= speed;
    c.angle += c.spinSpeed;

    if (c.isMoving) {
      c.movePhase += c.moveSpeed;
      c.y = c.baseY + Math.sin(c.movePhase) * c.moveRange;
    }

    const coinPadding = 8;
    if (!c.collected && isColliding(player, c, coinPadding)) {
      score += COIN_SCORE;
      c.collected = true;
    }
  });

  coins = coins.filter(c => c.x + c.w > 0 && !c.collected);
}

    function draw() {
      ctx.fillStyle = "#87ceeb";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(sunImg, 40, 40, 72, 72);
      clouds.forEach(c => {
        ctx.drawImage(c.img, c.x, c.y, c.w, c.h);
        c.x -= c.speed;
        if (c.x + c.w < 0) c.x = canvas.width;
      });
        mountains.forEach(m => {
    if (mountainImg.complete) {
      ctx.drawImage(mountainImg, m.x, m.y, m.w, m.h);
      // İkinci dağ (sonsuz döngü için)
      ctx.drawImage(mountainImg, m.x + m.w, m.y, m.w, m.h);
    }
    m.x -= m.speed * 0.3;  // Dağlar yavaş hareket eder (paralaks)
    if (m.x + m.w < 0) m.x = 0;
  });

  ctx.fillStyle = "#4caf50";
  ctx.fillRect(0, GROUND_Y, canvas.width, GROUND_HEIGHT);
      ctx.fillStyle = "#4caf50";
      ctx.fillRect(0, GROUND_Y, canvas.width, GROUND_HEIGHT);
      const img = runFrames[player.frame];
      if (img.complete) ctx.drawImage(img, player.x, player.y, player.w, player.h);
obstacles.forEach(o => {
  if (o.img && o.img.complete) ctx.drawImage(o.img, o.x, o.y, o.w, o.h);
});
      coins.forEach(c => {
        if (coinImg.complete) {
          ctx.save();
          ctx.translate(c.x + c.w / 2, c.y + c.h / 2);
          ctx.rotate(c.angle);
          ctx.drawImage(coinImg, -c.w / 2, -c.h / 2, c.w, c.h);
          ctx.restore();
        }
      });
      ctx.fillStyle = "#1b1b1b"; ctx.font = "16px 'W95FA'";
      ctx.textAlign = "left"; ctx.fillText("FPS: " + fps, 10, 30);
      ctx.textAlign = "center"; ctx.font = "24px 'W95FA'";
      ctx.fillText(score, canvas.width / 2, 80);
      ctx.textAlign = "right"; ctx.font = "14px 'W95FA'";
      ctx.fillText("BEST: " + highScore, canvas.width - 10, 30);
      if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff"; ctx.font = "36px 'W95FA'";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 60);
        ctx.font = "20px 'W95FA'";
        ctx.fillText("SKOR: " + score, canvas.width / 2, canvas.height / 2 - 10);
        if (score === highScore && score > 0) {
          ctx.fillStyle = "#ffd700"; ctx.font = "16px 'W95FA'";
          ctx.fillText("YENİ REKOR!", canvas.width / 2, canvas.height / 2 + 20);
        }
        if (restartImg.complete) {
          ctx.drawImage(restartImg, restartBtn.x, restartBtn.y, restartBtn.w, restartBtn.h);
        }
      }
    }

    function loop() {
      if (!gameStarted) return;
      updateFPS(); update(); draw();
      requestAnimationFrame(loop);
    }
</script>
</body>
</html>
